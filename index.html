<script type="text/babel" data-presets="env,react">
// Casa Ana — shared UI parts
const { useState, useEffect, useRef, useMemo } = React;

// ---- Currency helper ----
function useCurrency(primary = "USD") {
  // ~520 colones per USD (rough)
  const FX = 520;
  return useMemo(() => ({
    fmt(usd, opts = {}) {
      const { compact = false, secondary = false } = opts;
      const n = Number(usd);
      if (primary === "USD") {
        const main = compact && Math.abs(n) >= 1000
          ? "$" + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "k"
          : "$" + n.toLocaleString("en-US", { maximumFractionDigits: n % 1 === 0 ? 0 : 2 });
        if (!secondary) return main;
        const crc = Math.round(n * FX);
        return { main, sub: "₡" + crc.toLocaleString("en-US") };
      } else {
        const crc = Math.round(n * FX);
        const main = compact && crc >= 1000000
          ? "₡" + (crc / 1000000).toFixed(1) + "M"
          : "₡" + crc.toLocaleString("en-US");
        if (!secondary) return main;
        return { main, sub: "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 }) };
      }
    },
  }), [primary]);
}

// ---- Date helpers ----
function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(s, opts = {}) {
  const dt = parseDate(s);
  const m = dt.toLocaleString("en-US", { month: "short" });
  return opts.long
    ? `${m} ${dt.getDate()}, ${dt.getFullYear()}`
    : `${m} ${dt.getDate()}`;
}
function daysFromNow(s) {
  const today = new Date(2026, 4, 20); // May 20, 2026 reference
  const dt = parseDate(s);
  return Math.round((dt - today) / 86400000);
}
function dueLabel(s) {
  const d = daysFromNow(s);
  if (d < 0) return { txt: `${Math.abs(d)}d overdue`, kind: "danger" };
  if (d === 0) return { txt: "Due today", kind: "warn" };
  if (d === 1) return { txt: "Tomorrow", kind: "warn" };
  if (d <= 3) return { txt: `In ${d}d`, kind: "warn" };
  if (d <= 7) return { txt: `In ${d}d`, kind: "muted" };
  return { txt: fmtDate(s), kind: "muted" };
}

// ---- Pill ----
function Pill({ children, tone = "muted", solid = false, mono = false }) {
  const toneMap = {
    ok:      { bg: "var(--ok-soft)",      fg: "var(--ok)",      bd: "var(--ok)" },
    warn:    { bg: "var(--warn-soft)",    fg: "var(--warn)",    bd: "var(--warn)" },
    danger:  { bg: "var(--danger-soft)",  fg: "var(--danger)",  bd: "var(--danger)" },
    primary: { bg: "var(--primary-soft)", fg: "var(--primary)", bd: "var(--primary)" },
    accent:  { bg: "var(--accent-soft)",  fg: "var(--accent)",  bd: "var(--accent)" },
    ocean:   { bg: "var(--ocean-soft)",   fg: "var(--ocean)",   bd: "var(--ocean)" },
    gold:    { bg: "var(--gold-soft)",    fg: "var(--gold)",    bd: "var(--gold)" },
    muted:   { bg: "var(--bg3)",          fg: "var(--t2)",      bd: "var(--line2)" },
  };
  const c = toneMap[tone] || toneMap.muted;
  return (
    <span style={{
      display: "inline-flex",
      alignItems: "center",
      gap: 4,
      padding: "2px 8px",
      fontSize: 10,
      fontFamily: mono ? "var(--mono)" : "var(--sans)",
      fontWeight: 500,
      letterSpacing: mono ? 1 : 0.3,
      textTransform: mono ? "uppercase" : "none",
      borderRadius: 999,
      background: solid ? c.fg : c.bg,
      color: solid ? "#fff" : c.fg,
      whiteSpace: "nowrap",
      lineHeight: 1.6,
    }}>{children}</span>
  );
}

// ---- Property image placeholder ----
// Striped placeholder tinted by hue. Lets user know "drop photo here" via the label.
function PropImg({ prop, label, height = 180, rounded = true }) {
  const h = prop.hue ?? 168;
  const id = `stripe-${prop.id}`;
  return (
    <div style={{
      position: "relative",
      width: "100%",
      height,
      borderRadius: rounded ? "var(--r-lg)" : 0,
      overflow: "hidden",
      background: `oklch(0.82 0.05 ${h})`,
      border: "0.5px solid var(--line)",
    }}>
      <svg width="100%" height="100%" style={{ position: "absolute", inset: 0, opacity: 0.45 }}>
        <defs>
          <pattern id={id} patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="14" stroke={`oklch(0.55 0.10 ${h})`} strokeWidth="1.5" />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#${id})`} />
      </svg>
      <div style={{
        position: "absolute",
        left: 10, bottom: 10,
        fontFamily: "var(--mono)",
        fontSize: 9,
        letterSpacing: 1.4,
        textTransform: "uppercase",
        color: `oklch(0.30 0.10 ${h})`,
        background: `oklch(0.95 0.03 ${h} / 0.6)`,
        padding: "3px 7px",
        borderRadius: 2,
      }}>{label || `${prop.name} — photo`}</div>
    </div>
  );
}

// ---- KPI card ----
function Kpi({ label, value, sub, sublabel, tone = "primary" }) {
  return (
    <div style={{
      background: "var(--bg2)",
      border: "0.5px solid var(--line)",
      borderRadius: "var(--r-lg)",
      padding: "18px 20px",
      display: "flex",
      flexDirection: "column",
      gap: 4,
    }}>
      <div style={{
        fontFamily: "var(--mono)",
        fontSize: 10,
        letterSpacing: 1.4,
        textTransform: "uppercase",
        color: "var(--t2)",
      }}>{label}</div>
      <div style={{
        fontFamily: "var(--serif)",
        fontSize: 38,
        lineHeight: 1,
        letterSpacing: -0.5,
        color: "var(--t1)",
        marginTop: 4,
      }}>{value}</div>
      {sub && (
        <div style={{
          fontSize: 12,
          color: "var(--t2)",
          marginTop: 6,
          display: "flex",
          alignItems: "center",
          gap: 6,
        }}>
          {sublabel && <span style={{ fontFamily: "var(--mono)", fontSize: 9, letterSpacing: 1, textTransform: "uppercase", color: `var(--${tone})` }}>{sublabel}</span>}
          <span>{sub}</span>
        </div>
      )}
    </div>
  );
}

// ---- Card chrome ----
function Card({ title, action, children, padded = true, style = {} }) {
  return (
    <div style={{
      background: "var(--bg2)",
      border: "0.5px solid var(--line)",
      borderRadius: "var(--r-lg)",
      overflow: "hidden",
      ...style,
    }}>
      {(title || action) && (
        <div style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          padding: "14px 18px",
          borderBottom: "0.5px solid var(--line)",
        }}>
          <div style={{ fontFamily: "var(--serif)", fontSize: 20, color: "var(--t1)" }}>{title}</div>
          {action}
        </div>
      )}
      <div style={{ padding: padded ? "14px 18px" : 0 }}>{children}</div>
    </div>
  );
}

// ---- Section header (large, editorial) ----
function PageHead({ kicker, title, sub, right }) {
  return (
    <div style={{
      display: "flex",
      alignItems: "flex-end",
      justifyContent: "space-between",
      padding: "28px 40px 20px",
      borderBottom: "0.5px solid var(--line)",
      gap: 24,
    }}>
      <div>
        {kicker && <div style={{
          fontFamily: "var(--mono)", fontSize: 10, letterSpacing: 2,
          textTransform: "uppercase", color: "var(--t2)", marginBottom: 6
        }}>{kicker}</div>}
        <div style={{
          fontFamily: "var(--serif)", fontSize: 42, lineHeight: 1.05,
          fontStyle: "italic", color: "var(--t1)", letterSpacing: -0.5
        }}>{title}</div>
        {sub && <div style={{ fontSize: 13, color: "var(--t2)", marginTop: 8, maxWidth: 560 }}>{sub}</div>}
      </div>
      {right && <div>{right}</div>}
    </div>
  );
}

// ---- Status pill for tasks ----
function TaskStatusPill({ status, priority }) {
  if (status === "done") return <Pill tone="ok" mono>Done</Pill>;
  if (priority === "high") return <Pill tone="danger" mono>High</Pill>;
  if (priority === "med")  return <Pill tone="warn" mono>Med</Pill>;
  return <Pill tone="muted" mono>Low</Pill>;
}

function BillStatusPill({ status }) {
  if (status === "paid")    return <Pill tone="ok" mono>Paid</Pill>;
  if (status === "overdue") return <Pill tone="danger" mono>Overdue</Pill>;
  return <Pill tone="warn" mono>Unpaid</Pill>;
}

// ---- Sparkline (income vs expense) ----
function Sparkline({ income, expense, width = 220, height = 56 }) {
  const max = Math.max(...income, ...expense);
  const stepX = width / (income.length - 1);
  const toY = v => height - (v / max) * (height - 4) - 2;
  const inPath = income.map((v, i) => `${i === 0 ? "M" : "L"}${i * stepX},${toY(v)}`).join(" ");
  const exPath = expense.map((v, i) => `${i === 0 ? "M" : "L"}${i * stepX},${toY(v)}`).join(" ");
  const inArea = `${inPath} L${width},${height} L0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <path d={inArea} fill="var(--primary-soft)" />
      <path d={inPath} stroke="var(--primary)" strokeWidth="1.5" fill="none" />
      <path d={exPath} stroke="var(--accent)" strokeWidth="1.2" fill="none" strokeDasharray="2,2" />
    </svg>
  );
}

// ---- Bookings strip (mini gantt for a property) ----
function BookingStrip({ bookings, days = 28, startISO = "2026-05-20" }) {
  const start = parseDate(startISO);
  const dayWidth = 100 / days;
  return (
    <div style={{ position: "relative", height: 32, background: "var(--bg3)", borderRadius: 4, overflow: "hidden" }}>
      {bookings.map(b => {
        const inDay = Math.max(0, (parseDate(b.checkin) - start) / 86400000);
        const outDay = Math.min(days, (parseDate(b.checkout) - start) / 86400000);
        if (outDay <= 0 || inDay >= days) return null;
        const left = inDay * dayWidth;
        const w = Math.max(0.8, (outDay - inDay) * dayWidth);
        const color = b.status === "in-house" ? "var(--accent)" : "var(--primary)";
        return (
          <div key={b.id} title={`${b.guest} · ${b.nights}n`} style={{
            position: "absolute",
            top: 4, bottom: 4,
            left: `${left}%`,
            width: `${w}%`,
            background: color,
            borderRadius: 3,
            display: "flex",
            alignItems: "center",
            padding: "0 6px",
            overflow: "hidden",
          }}>
            <span style={{ fontSize: 10, color: "#fff", whiteSpace: "nowrap", textOverflow: "ellipsis", overflow: "hidden" }}>
              {b.guest}
            </span>
          </div>
        );
      })}
    </div>
  );
}

<script type="text/babel" data-presets="env,react">
// Nena Casa — Contacts (soft cards)
const { useState: useStateC } = React;

// ─── Helpers ─────────────────────────────────────────────────────
const FX = 510; // CRC per USD (rough)
const fmt$ = n => (n == null) ? "—" : (n === 0 ? "$0" : `${Number(n).toLocaleString("en-US", { maximumFractionDigits: 2 })}`);
const fmtCRC = n => (n == null || n === 0) ? "" : `₡${Math.round(Number(n) * FX).toLocaleString("en-US")}`;
const pctOf = (part, whole) => {
  if (!whole) return "—";
  const p = (part / whole) * 100;
  return `${p.toFixed(p < 10 ? 1 : 0)}% of rent`;
};

function BreakdownBar({ segments, total }) {
  const sum = segments.reduce((s, x) => s + (x.amt || 0), 0);
  const denom = Math.max(total, sum) || 1;
  return (
    <div>
      <div style={{
        display: "flex", height: 14, borderRadius: 999,
        overflow: "hidden", background: "var(--bg3)",
      }}>
        {segments.map((s, i) => {
          const w = (s.amt / denom) * 100;
          if (w < 0.1) return null;
          return (
            <div key={i} title={`${s.label}: ${fmt$(s.amt)}`} style={{
              width: `${w}%`, background: s.color,
              transition: "width 200ms",
            }}/>
          );
        })}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginTop: 12 }}>
        {segments.map((s, i) => {
          if (!s.amt) return null;
          const pct = (s.amt / denom) * 100;
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
              <span style={{ width: 9, height: 9, borderRadius: 2, background: s.color }}/>
              <span style={{ color: "var(--t1)", fontWeight: 600 }}>{s.label}</span>
              <span style={{ color: "var(--t3)", fontVariantNumeric: "tabular-nums" }}>{pct.toFixed(pct < 10 ? 1 : 0)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Combined money cell: USD primary, CRC secondary underneath
function Money({ amount, sign = "+", muted = false, skip = false, negative = false }) {
  if (amount == null || skip) {
    return <span style={{ color: "var(--t3)", fontWeight: 600 }}>—</span>;
  }
  const color = muted ? "var(--t3)" : negative ? "var(--danger)" : "var(--ok)";
  return (
    <span style={{ display: "inline-flex", flexDirection: "column", alignItems: "flex-end", lineHeight: 1.1 }}>
      <span style={{ fontSize: 14, fontWeight: 600, color, fontVariantNumeric: "tabular-nums" }}>
        {sign}{fmt$(amount)}
      </span>
      {amount > 0 && (
        <span style={{ fontSize: 10.5, color: "var(--t3)", fontWeight: 500, marginTop: 3, fontVariantNumeric: "tabular-nums" }}>
          {fmtCRC(amount)}
        </span>
      )}
    </span>
  );
}

// Sum a number array ignoring nulls
const sum = arr => arr.filter(v => v != null).reduce((s, v) => s + v, 0);

// ─── Property page ──────────────────────────────────────────────
function PropertyPage({ p }) {
  const data = window.CASA_ANA_DATA;
  const { months, expenses, pikiFunds, ricardo } = data;

  // Slice months to what's "active" — first index that's null+1
  const lastRentIdx = (() => {
    let last = -1;
    p.rent.forEach((v, i) => { if (v != null) last = i; });
    return last;
  })();
  const visibleMonths = months.slice(0, Math.max(lastRentIdx + 1, 8));

  // Totals
  const rentYTD = sum(p.rent);
  const hoaYTD = sum(p.hoa);
  const expensesForProp = expenses.filter(e => e[p.id]).map(e => ({ month: e.month, cat: e.cat, amt: e[p.id], note: e.note }));
  const expensesYTD = expensesForProp.reduce((s, e) => s + (e.amt || 0), 0);
  // Group by category
  const expenseCats = {};
  expensesForProp.forEach(e => {
    if (!expenseCats[e.cat]) expenseCats[e.cat] = { total: 0, items: [] };
    expenseCats[e.cat].total += e.amt || 0;
    expenseCats[e.cat].items.push(e);
  });
  const expenseCatList = Object.entries(expenseCats).sort((a, b) => b[1].total - a[1].total);
  const pikiForProp = pikiFunds.filter(e => e[p.id]).map(e => ({ month: e.month, amt: e[p.id], note: e.note }));
  const pikiYTD = pikiForProp.reduce((s, e) => s + (e.amt || 0), 0);
  const ricardoForProp = ricardo[p.id] || [];
  const ricardoYTD = ricardoForProp.reduce((s, r) => s + (r.skip ? 0 : (r.amt || 0)), 0);
  const totalOut = hoaYTD + expensesYTD + pikiYTD + ricardoYTD;
  const net = rentYTD - totalOut;

  const statusMap = {
    rented:    { tone: "var(--ok)",      bg: "var(--ok-soft)",     label: "Rented" },
    vacant:    { tone: "var(--warn)",    bg: "var(--warn-soft)",   label: "Vacant" },
    watch:     { tone: "var(--warn)",    bg: "var(--warn-soft)",   label: "Watch" },
    "for-sale":{ tone: "var(--accent)",  bg: "var(--accent-soft)", label: "For sale" },
  };
  const st = statusMap[p.status] || statusMap.rented;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 40 }}>
      {/* Hero */}
      <section>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <SoftPill color={st.tone} bg={st.bg}>{st.label}</SoftPill>
          <span style={{ fontSize: 12, color: "var(--t3)", fontWeight: 500 }}>
            Managed by {p.manager} · {p.llc}
          </span>
        </div>
        <h1 style={{
          fontSize: 48, fontWeight: 700, lineHeight: 1.05,
          letterSpacing: -1, margin: 0, color: "var(--t1)",
        }}>{p.name}</h1>
      </section>

      {/* Comps — top of page */}
      <CompsBlock kind="rent" p={p} />
      <CompsBlock kind="sale" p={p} />

      {/* YTD summary — split by category */}
      <section style={{
        display: "grid",
        gridTemplateColumns: "repeat(4, 1fr)",
        gap: 12,
      }}>
        <StatTile label="Rent collected" value={fmt$(rentYTD)} crcValue={fmtCRC(rentYTD)} sub="100% · income" tone="ok" />
        <StatTile label="HOA"            value={fmt$(hoaYTD)}  crcValue={fmtCRC(hoaYTD)}  sub={pctOf(hoaYTD, rentYTD)} tone="danger" />
        <StatTile label="Piki Funds"     value={fmt$(pikiYTD)} crcValue={fmtCRC(pikiYTD)} sub={pctOf(pikiYTD, rentYTD)} tone="danger" />
        <StatTile label="Ricardo"        value={fmt$(ricardoYTD)} crcValue={fmtCRC(ricardoYTD)} sub={pctOf(ricardoYTD, rentYTD)} tone="danger" />
      </section>

      {/* Expense category tiles */}
      {expenseCatList.length > 0 && (
        <section>
          <SectionHead title="Expenses by category" sub={`Total ${fmt$(expensesYTD)} · ${pctOf(expensesYTD, rentYTD)}`} />
          <div style={{
            display: "grid",
            gridTemplateColumns: `repeat(${Math.min(expenseCatList.length, 4)}, 1fr)`,
            gap: 12,
          }}>
            {expenseCatList.map(([cat, info]) => (
              <StatTile key={cat} label={cat} value={fmt$(info.total)} crcValue={fmtCRC(info.total)} sub={pctOf(info.total, rentYTD)} tone="danger" />
            ))}
          </div>
        </section>
      )}

      {/* Net + breakdown bar */}
      <section style={{
        background: "var(--bg2)",
        borderRadius: 20,
        padding: "24px 28px",
        boxShadow: "var(--shadow-sm)",
        border: "1px solid var(--line)",
        display: "flex",
        flexDirection: "column",
        gap: 18,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div>
            <div style={{
              fontSize: 11, fontWeight: 600, color: "var(--t3)",
              textTransform: "uppercase", letterSpacing: 0.6,
            }}>Net YTD</div>
            <div style={{
              fontSize: 38, fontWeight: 700, marginTop: 6, lineHeight: 1,
              letterSpacing: -0.8, fontVariantNumeric: "tabular-nums",
              color: net >= 0 ? "var(--ok)" : "var(--danger)",
            }}>{fmt$(net)}</div>
            <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 4, fontVariantNumeric: "tabular-nums" }}>
              {fmtCRC(net)}
            </div>
          </div>
          {rentYTD > 0 && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 13, color: "var(--t2)", fontWeight: 500 }}>
                {Math.round((net / rentYTD) * 100)}% profit
              </div>
              <div style={{ fontSize: 11.5, color: "var(--t3)", marginTop: 4 }}>
                {Math.round((totalOut / rentYTD) * 100)}% goes out
              </div>
            </div>
          )}
        </div>
        <BreakdownBar segments={[
          { label: "HOA",      amt: hoaYTD,      color: "#C76A56" },
          { label: "Expenses", amt: expensesYTD, color: "#D88656" },
          { label: "Piki",     amt: pikiYTD,     color: "#D9A24A" },
          { label: "Ricardo",  amt: ricardoYTD,  color: "#9C7A4A" },
          { label: "Kept",     amt: Math.max(net, 0), color: "#2D6B5A" },
        ]} total={rentYTD} />
      </section>

      {/* Rent collected */}
      <MonthTable
        title="Rent Collected"
        sub={`Monthly rent in. YTD ${fmt$(rentYTD)}.`}
        rows={visibleMonths.map((m, i) => ({ month: m, amt: p.rent[i] }))}
        emptyAs="—"
      />

      {/* HOA Maintenance */}
      <MonthTable
        title="HOA Maintenance Paid (Actuals)"
        sub={`Actuals as paid. YTD ${fmt$(hoaYTD)}.`}
        rows={visibleMonths.map((m, i) => ({ month: m, amt: p.hoa[i] }))}
        emptyAs="—"
        negative
      />

      {/* Expenses — grouped by category */}
      <section>
        <SectionHead title="Expenses" sub={`One-offs by category. YTD ${fmt$(expensesYTD)}.`} />
        {expenseCatList.length === 0 ? (
          <div style={{
            background: "var(--bg2)", borderRadius: 20, padding: "26px 24px",
            color: "var(--t3)", textAlign: "center", fontSize: 13.5,
            boxShadow: "var(--shadow-sm)", border: "1px solid var(--line)",
          }}>None yet for this property.</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {expenseCatList.map(([cat, group]) => (
              <ExpenseCategoryCard key={cat} cat={cat} group={group} />
            ))}
          </div>
        )}
      </section>

      {/* Piki Funds */}
      <NoteTable
        title="Piki Funds"
        sub={`Viáticos and pass-throughs. YTD ${fmt$(pikiYTD)}.`}
        rows={pikiForProp}
        negative
      />

      {/* Ricardo */}
      <NoteTable
        title="Ricardo"
        sub={`Lawyer — monthly retainer. YTD ${fmt$(ricardoYTD)}.`}
        rows={ricardoForProp}
        negative
        showSkips
      />
    </div>
  );
}

// ─── Expense category card (collapsible group) ─────────────────

      background: "var(--bg2)",
      borderRadius: 20,
      boxShadow: "var(--shadow-sm)",
      border: "1px solid var(--line)",
      overflow: "hidden",
    }}>
      <div style={{
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",

        <div style={{
          fontSize: 15, fontWeight: 700, color: "var(--t1)",

      <table style={{ width: "100%", borderCollapse: "collapse" }}>

// ─── Month table (rent / hoa) ───────────────────────────────────

          <tbody>
            {rows.map((r, i) => {
              const isLast = i === rows.length - 1;

                  <td style={{
                    padding: "13px 22px",
                    textAlign: "right",

              })}

        )}
      </div>

}

// ─── Portfolio comps (overview combined view) ───────────────────
function PortfolioComps({ properties }) {
  // Aggregate rent comps across properties
  const rentAvg = (() => {
    let total = 0, count = 0;
    properties.forEach(p => p.comps.rent.forEach(c => { total += c.rent; count++; }));
    return count ? total / count : 0;
  })();
  const saleAvg = (() => {
    let total = 0, count = 0;
    properties.forEach(p => p.comps.sale.forEach(c => { total += c.price; count++; }));
    return count ? total / count : 0;
  })();
  const yourEstTotal = properties.reduce((s, p) => s + (p.est || 0), 0);
  const yourRentTotal = properties.reduce((s, p) => {
    const last = [...p.rent].reverse().find(v => v != null && v > 0);
    return s + (last || 0);
  }, 0);

  return (
    <section>
      <SectionHead title="Market comps" sub="Snapshot across all four units" />
      <div style={{
        background: "var(--bg2)",
        borderRadius: 20,
        boxShadow: "var(--shadow-sm)",
        border: "1px solid var(--line)",
        overflow: "hidden",
      }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "var(--bg3)" }}>
              <th style={cellHead}>Property</th>
              <th style={{ ...cellHead, textAlign: "right" }}>Current rent</th>
              <th style={{ ...cellHead, textAlign: "right" }}>Rent comp avg</th>
              <th style={{ ...cellHead, textAlign: "right" }}>Your sale est.</th>
              <th style={{ ...cellHead, textAlign: "right" }}>Sale comp avg</th>
            </tr>
          </thead>
          <tbody>
            {properties.map((p, i) => {
              const rAvg = p.comps.rent.reduce((s, c) => s + c.rent, 0) / p.comps.rent.length;
              const sAvg = p.comps.sale.reduce((s, c) => s + c.price, 0) / p.comps.sale.length;
              const lastRent = [...p.rent].reverse().find(v => v != null && v > 0);
              const rDelta = (lastRent || 0) - rAvg;
              const isLast = i === properties.length - 1;
              return (
                <tr key={p.id} style={{
                  borderBottom: isLast ? "none" : "1px solid var(--line)",
                }}>
                  <td style={{ padding: "14px 22px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{
                        width: 9, height: 9, borderRadius: 50,
                        background: `linear-gradient(135deg, oklch(0.72 0.10 ${p.hue}), oklch(0.52 0.12 ${p.hue}))`,
                      }}/>
                      <span style={{ fontSize: 13.5, fontWeight: 600, color: "var(--t1)" }}>{p.name}</span>
                      {p.status === "for-sale" && (
                        <span style={{
                          fontSize: 9, fontWeight: 700, letterSpacing: 0.4,
                          color: "var(--accent)", background: "var(--accent-soft)",
                          padding: "1px 6px", borderRadius: 999,
                          textTransform: "uppercase",
                        }}>For sale</span>
                      )}
                    </div>
                  </td>
                  <td style={{ padding: "14px 22px", textAlign: "right", fontSize: 13.5, fontWeight: 600, color: "var(--t1)", fontVariantNumeric: "tabular-nums" }}>
                    {fmt$(lastRent)}
                  </td>
                  <td style={{ padding: "14px 22px", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
                    <div style={{ fontSize: 13, color: "var(--t2)" }}>{fmt$(rAvg)}</div>
                    {lastRent && (
                      <div style={{
                        fontSize: 11, fontWeight: 600, marginTop: 2,
                        color: rDelta >= 0 ? "var(--ok)" : "var(--danger)",
                      }}>{rDelta >= 0 ? "+" : ""}${Math.round(rDelta).toLocaleString()}</div>
                    )}
                  </td>
                  <td style={{ padding: "14px 22px", textAlign: "right", fontSize: 13.5, fontWeight: 600, color: "var(--t1)", fontVariantNumeric: "tabular-nums" }}>
                    {p.est ? `${(p.est/1000).toFixed(0)}k` : "—"}
                  </td>
                  <td style={{ padding: "14px 22px", textAlign: "right", fontSize: 13, color: "var(--t2)", fontVariantNumeric: "tabular-nums" }}>
                    ${(sAvg/1000).toFixed(0)}k
                  </td>
                </tr>
              );
            })}
            <tr style={{ background: "var(--primary-tint)", borderTop: "2px solid var(--line2)" }}>
              <td style={{ padding: "16px 22px", fontSize: 13.5, fontWeight: 700, color: "var(--primary-deep)" }}>
                Portfolio totals
              </td>
              <td style={{ padding: "16px 22px", textAlign: "right", fontSize: 14, fontWeight: 700, color: "var(--primary-deep)", fontVariantNumeric: "tabular-nums" }}>
                {fmt$(yourRentTotal)}
              </td>
              <td style={{ padding: "16px 22px", textAlign: "right", fontSize: 13, color: "var(--t2)", fontVariantNumeric: "tabular-nums" }}>
                avg {fmt$(rentAvg)}
              </td>
              <td style={{ padding: "16px 22px", textAlign: "right", fontSize: 14, fontWeight: 700, color: "var(--primary-deep)", fontVariantNumeric: "tabular-nums" }}>
                ${(yourEstTotal/1000).toFixed(0)}k
              </td>
              <td style={{ padding: "16px 22px", textAlign: "right", fontSize: 13, color: "var(--t2)", fontVariantNumeric: "tabular-nums" }}>
                avg ${(saleAvg/1000).toFixed(0)}k
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  );
}

// ─── Comps block ────────────────────────────────────────────────
function CompsBlock({ kind, p }) {
  const comps = kind === "rent" ? p.comps.rent : p.comps.sale;
  const title = kind === "rent" ? "Rental comps" : "For-sale comps";
  let sub;
  if (kind === "rent") {
    const avg = comps.reduce((s, c) => s + c.rent, 0) / comps.length;
    const lastRent = [...p.rent].reverse().find(v => v != null && v > 0);
    if (lastRent) {
      const delta = lastRent - avg;
      const pct = Math.round((delta / avg) * 100);
      sub = `Avg ${Math.round(avg).toLocaleString()} · you're ${delta >= 0 ? "above" : "below"} market by ${Math.round(Math.abs(delta)).toLocaleString()} (${pct > 0 ? "+" : ""}${pct}%)`;
    } else {
      sub = `Avg ${Math.round(avg).toLocaleString()}/mo nearby`;
    }
  } else {
    sub = p.est ? `Your estimate: ${p.est.toLocaleString()}` : "Recent activity nearby";
  }

  return (
    <section>
      <SectionHead title={title} sub={sub} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
        {comps.map((c, i) => (
          <CompCard
            key={i}
            name={c.name}
            sub={`${c.beds} BR · ${c.note}`}
            price={kind === "rent" ? `${c.rent.toLocaleString()}` : `${(c.price / 1000).toFixed(0)}k`}
            priceSub={kind === "rent" ? "per month" : `${c.price.toLocaleString()}`}
            crcSub={kind === "rent" ? fmtCRC(c.rent) + "/mo" : fmtCRC(c.price)}
          />
        ))}
      </div>
    </section>
  );
}

}

// ─── Overview (landing page) ───────────────────────────────────
function Overview({ onPick }) {
  const data = window.CASA_ANA_DATA;
  const { properties, expenses, pikiFunds, ricardo, months } = data;

  // Per-property totals + category breakdown
  const expensesByCat = {};
  expenses.forEach(e => {
    if (!expensesByCat[e.cat]) expensesByCat[e.cat] = 0;
    expensesByCat[e.cat] += (e.manfredonia || 0) + (e.espada || 0) + (e.montijo || 0) + (e.antioco || 0);
  });
  const catList = Object.entries(expensesByCat).sort((a, b) => b[1] - a[1]);

  const rows = properties.map(p => {
    const rentYTD = sum(p.rent);
    const hoaYTD = sum(p.hoa);
    const expYTD = expenses.filter(e => e[p.id]).reduce((s, e) => s + (e[p.id] || 0), 0);
    const pikiYTD = pikiFunds.filter(e => e[p.id]).reduce((s, e) => s + (e[p.id] || 0), 0);
    const ricYTD = (ricardo[p.id] || []).reduce((s, r) => s + (r.skip ? 0 : (r.amt || 0)), 0);
    const outYTD = hoaYTD + expYTD + pikiYTD + ricYTD;
    const net = rentYTD - outYTD;
    return { p, rentYTD, hoaYTD, expYTD, pikiYTD, ricYTD, outYTD, net };
  });

  const total = rows.reduce((acc, r) => ({
    rent: acc.rent + r.rentYTD,
    hoa: acc.hoa + r.hoaYTD,
    exp: acc.exp + r.expYTD,
    piki: acc.piki + r.pikiYTD,
    ric: acc.ric + r.ricYTD,
    out: acc.out + r.outYTD,
    net: acc.net + r.net,
  }), { rent: 0, hoa: 0, exp: 0, piki: 0, ric: 0, out: 0, net: 0 });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 40 }}>
      {/* Hero */}
      <section>
        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: 0.8,
          color: "var(--t3)", textTransform: "uppercase", marginBottom: 10,
        }}>Portfolio · Year to date</div>
        <h1 style={{
          fontSize: 48, fontWeight: 700, lineHeight: 1.05,
          letterSpacing: -1, margin: 0, color: "var(--t1)",
        }}>Running total</h1>
        <div style={{ fontSize: 14.5, color: "var(--t2)", marginTop: 10, fontWeight: 500, maxWidth: 560 }}>
          All four units combined. Click a property in the sidebar for the breakdown.
        </div>
      </section>

      {/* Comps summary — all four properties */}
      <section>
        <SectionHead title="Comps · all properties" sub="Latest rent and what's selling nearby. Click a row to drill in." />
        <div style={{
          background: "var(--bg2)",
          borderRadius: 20,
          boxShadow: "var(--shadow-sm)",
          border: "1px solid var(--line)",
          overflow: "hidden",
        }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "var(--bg3)" }}>
                <th style={cellHead}>Property</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Your rent</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Rent comp avg</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Your est.</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Sale comp avg</th>
              </tr>
            </thead>
            <tbody>
              {properties.map((p, i) => {
                const lastRent = [...p.rent].reverse().find(v => v != null && v > 0);
                const rentAvg = p.comps.rent.reduce((s, c) => s + c.rent, 0) / p.comps.rent.length;
                const saleAvg = p.comps.sale.reduce((s, c) => s + c.price, 0) / p.comps.sale.length;
                const rentDelta = lastRent ? lastRent - rentAvg : 0;
                const saleDelta = p.est ? p.est - saleAvg : 0;
                return (
                  <tr key={p.id}
                    onClick={() => onPick(p.id)}
                    style={{
                      borderBottom: i === properties.length - 1 ? "none" : "1px solid var(--line)",
                      cursor: "pointer",
                      transition: "background 120ms",
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = "var(--bg)"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <td style={{ padding: "16px 22px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{
                          width: 10, height: 10, borderRadius: 50,
                          background: `linear-gradient(135deg, oklch(0.72 0.10 ${p.hue}), oklch(0.52 0.12 ${p.hue}))`,
                          flexShrink: 0,
                        }}/>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t1)" }}>{p.name}</div>
                          <div style={{ fontSize: 11, color: "var(--t3)", marginTop: 2, fontWeight: 500 }}>
                            {p.status === "for-sale" ? "For sale" : "Rented"}
                          </div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "var(--t1)", fontVariantNumeric: "tabular-nums" }}>
                        {lastRent ? `${lastRent.toLocaleString()}` : "—"}
                      </div>
                      <div style={{ fontSize: 10.5, color: "var(--t3)", marginTop: 2, fontVariantNumeric: "tabular-nums" }}>/mo</div>
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t2)", fontVariantNumeric: "tabular-nums" }}>
                        ${Math.round(rentAvg).toLocaleString()}
                      </div>
                      {lastRent && (
                        <div style={{
                          fontSize: 10.5, fontWeight: 600, marginTop: 2, fontVariantNumeric: "tabular-nums",
                          color: rentDelta >= 0 ? "var(--ok)" : "var(--danger)",
                        }}>
                          {rentDelta >= 0 ? "+" : "−"}${Math.round(Math.abs(rentDelta)).toLocaleString()}
                        </div>
                      )}
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "var(--t1)", fontVariantNumeric: "tabular-nums" }}>
                        {p.est ? `${p.est.toLocaleString()}` : "—"}
                      </div>
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t2)", fontVariantNumeric: "tabular-nums" }}>
                        ${Math.round(saleAvg).toLocaleString()}
                      </div>
                      {p.est && (
                        <div style={{
                          fontSize: 10.5, fontWeight: 600, marginTop: 2, fontVariantNumeric: "tabular-nums",
                          color: saleDelta >= 0 ? "var(--ok)" : "var(--danger)",
                        }}>
                          {saleDelta >= 0 ? "+" : "−"}${Math.round(Math.abs(saleDelta)).toLocaleString()}
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
              {/* Portfolio total row */}
              {(() => {
                const totalEst = properties.reduce((s, p) => s + (p.est || 0), 0);
                const totalSaleAvg = properties.reduce((s, p) => s + (p.comps.sale.reduce((a, c) => a + c.price, 0) / p.comps.sale.length), 0);
                const totalRent = properties.reduce((s, p) => {
                  const lr = [...p.rent].reverse().find(v => v != null && v > 0);
                  return s + (lr || 0);
                }, 0);
                const totalRentAvg = properties.reduce((s, p) => s + (p.comps.rent.reduce((a, c) => a + c.rent, 0) / p.comps.rent.length), 0);
                return (
                  <tr style={{ background: "var(--primary-tint)", borderTop: "2px solid var(--line2)" }}>
                    <td style={{ padding: "18px 22px", fontSize: 14, fontWeight: 700, color: "var(--primary-deep)" }}>
                      Portfolio total
                    </td>
                    <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "var(--primary-deep)", fontVariantNumeric: "tabular-nums" }}>
                        ${totalRent.toLocaleString()}
                      </div>
                      <div style={{ fontSize: 10.5, color: "var(--t3)", marginTop: 2 }}>/mo</div>
                    </td>
                    <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "var(--primary-deep)", fontVariantNumeric: "tabular-nums" }}>
                        ${Math.round(totalRentAvg).toLocaleString()}
                      </div>
                    </td>
                    <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 16, fontWeight: 700, color: "var(--primary-deep)", letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>
                        ${totalEst.toLocaleString()}
                      </div>
                      <div style={{ fontSize: 10.5, color: "var(--t3)", marginTop: 2, fontVariantNumeric: "tabular-nums" }}>
                        ₡{Math.round(totalEst * 510).toLocaleString()}
                      </div>
                    </td>
                    <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <div style={{ fontSize: 16, fontWeight: 700, color: "var(--primary-deep)", letterSpacing: -0.3, fontVariantNumeric: "tabular-nums" }}>
                        ${Math.round(totalSaleAvg).toLocaleString()}
                      </div>
                      <div style={{ fontSize: 10.5, color: "var(--t3)", marginTop: 2, fontVariantNumeric: "tabular-nums" }}>
                        ₡{Math.round(totalSaleAvg * 510).toLocaleString()}
                      </div>
                    </td>
                  </tr>
                );
              })()}
            </tbody>
          </table>
        </div>
      </section>

      {/* Big combined stats */}
      <section style={{
        display: "grid",
        gridTemplateColumns: "repeat(5, 1fr)",
        gap: 12,
      }}>
        <StatTile label="Rent collected" value={fmt$(total.rent)} crcValue={fmtCRC(total.rent)} sub="100% · income" tone="ok" />
        <StatTile label="HOA"          value={fmt$(total.hoa)}  crcValue={fmtCRC(total.hoa)}  sub={pctOf(total.hoa, total.rent)} tone="danger" />
        <StatTile label="Expenses"     value={fmt$(total.exp)}  crcValue={fmtCRC(total.exp)}  sub={pctOf(total.exp, total.rent)} tone="danger" />
        <StatTile label="Piki Funds"   value={fmt$(total.piki)} crcValue={fmtCRC(total.piki)} sub={pctOf(total.piki, total.rent)} tone="danger" />
        <StatTile label="Ricardo"      value={fmt$(total.ric)}  crcValue={fmtCRC(total.ric)}  sub={pctOf(total.ric, total.rent)} tone="danger" />
      </section>

      {/* Net + breakdown bar */}
      <section style={{
        background: "var(--bg2)",
        borderRadius: 20,
        padding: "24px 28px",
        boxShadow: "var(--shadow-sm)",
        border: "1px solid var(--line)",
        display: "flex",
        flexDirection: "column",
        gap: 18,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div>
            <div style={{
              fontSize: 11, fontWeight: 600, color: "var(--t3)",
              textTransform: "uppercase", letterSpacing: 0.6,
            }}>Net YTD</div>
            <div style={{
              fontSize: 38, fontWeight: 700, marginTop: 6, lineHeight: 1,
              letterSpacing: -0.8, fontVariantNumeric: "tabular-nums",
              color: total.net >= 0 ? "var(--ok)" : "var(--danger)",
            }}>{fmt$(total.net)}</div>
            <div style={{ fontSize: 12, color: "var(--t3)", marginTop: 4, fontVariantNumeric: "tabular-nums" }}>
              {fmtCRC(total.net)}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 13, color: "var(--t2)", fontWeight: 500 }}>
              {Math.round((total.net / total.rent) * 100)}% profit
            </div>
            <div style={{ fontSize: 11.5, color: "var(--t3)", marginTop: 4 }}>
              {Math.round(((total.out) / total.rent) * 100)}% goes out
            </div>
          </div>
        </div>
        <BreakdownBar segments={[
          { label: "HOA",      amt: total.hoa,  color: "#C76A56" },
          { label: "Expenses", amt: total.exp,  color: "#D88656" },
          { label: "Piki",     amt: total.piki, color: "#D9A24A" },
          { label: "Ricardo",  amt: total.ric,  color: "#9C7A4A" },
          { label: "Kept",     amt: Math.max(total.net, 0), color: "#2D6B5A" },
        ]} total={total.rent} />
      </section>

      {/* Per-property breakdown table */}
      <section>
        <SectionHead title="By property" sub="YTD totals · click a row to drill in" />
        <div style={{
          background: "var(--bg2)",
          borderRadius: 20,
          boxShadow: "var(--shadow-sm)",
          border: "1px solid var(--line)",
          overflow: "hidden",
        }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "var(--bg3)" }}>
                <th style={cellHead}>Property</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Rent in</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Out</th>
                <th style={{ ...cellHead, textAlign: "right" }}>Net</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const isLast = i === rows.length - 1;
                return (
                  <tr key={r.p.id}
                    onClick={() => onPick(r.p.id)}
                    style={{
                      borderBottom: isLast ? "none" : "1px solid var(--line)",
                      cursor: "pointer",
                      transition: "background 120ms",
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = "var(--bg)"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <td style={{ padding: "16px 22px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{
                          width: 10, height: 10, borderRadius: 50,
                          background: `linear-gradient(135deg, oklch(0.72 0.10 ${r.p.hue}), oklch(0.52 0.12 ${r.p.hue}))`,
                          flexShrink: 0,
                        }}/>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t1)" }}>{r.p.name}</div>
                          <div style={{ fontSize: 11, color: "var(--t3)", marginTop: 2, fontWeight: 500 }}>
                            Mgr {r.p.manager}{r.p.status === "for-sale" ? " · For sale" : ""}
                          </div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <Money amount={r.rentYTD} sign="+" />
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <Money amount={r.outYTD} sign="-" negative />
                    </td>
                    <td style={{ padding: "16px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                      <Money amount={Math.abs(r.net)} sign={r.net >= 0 ? "+" : "-"} negative={r.net < 0} />
                    </td>
                  </tr>
                );
              })}
              {/* Total row */}
              <tr style={{ background: "var(--primary-tint)", borderTop: "2px solid var(--line2)" }}>
                <td style={{ padding: "18px 22px", fontSize: 14, fontWeight: 700, color: "var(--primary-deep)" }}>
                  Combined total
                </td>
                <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                  <Money amount={total.rent} sign="+" />
                </td>
                <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                  <Money amount={total.out} sign="-" negative />
                </td>
                <td style={{ padding: "18px 22px", textAlign: "right", whiteSpace: "nowrap" }}>
                  <Money amount={Math.abs(total.net)} sign={total.net >= 0 ? "+" : "-"} negative={total.net < 0} />
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      {/* Combined comps summary */}
      <PortfolioComps properties={properties} />

      {/* Expense category breakdown */}
      <section>
        <SectionHead title="Expenses by category" sub="Combined YTD across all four units" />
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))",
          gap: 12,
        }}>
          {catList.map(([cat, amt]) => (
            <BucketCard key={cat} label={cat} amt={amt} />
          ))}
        </div>
      </section>

      {/* (legacy hidden) Expense buckets */}
      <section style={{ display: "none" }}>
        <SectionHead title="Where the money went" sub="Combined YTD · across all four units" />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
          <BucketCard label="HOA"      amt={total.hoa} />
          <BucketCard label="Expenses" amt={total.exp} />
          <BucketCard label="Piki Funds" amt={total.piki} />
          <BucketCard label="Ricardo"  amt={total.ric} />
        </div>
      </section>
    </div>
  );
}

const cellHead = {
  padding: "12px 22px",
  fontSize: 11,
  fontWeight: 600,
  color: "var(--t3)",
  textTransform: "uppercase",
  letterSpacing: 0.6,
  textAlign: "left",
};

function BucketCard({ label, amt }) {
  return (
    <div style={{
      background: "var(--bg2)",
      borderRadius: 16,
      padding: "16px 20px",
      boxShadow: "var(--shadow-sm)",
      border: "1px solid var(--line)",
    }}>
      <div style={{
        fontSize: 11, fontWeight: 600, color: "var(--t3)",
        textTransform: "uppercase", letterSpacing: 0.6,
      }}>{label}</div>
      <div style={{
        fontSize: 22, fontWeight: 700, color: "var(--danger)",
        letterSpacing: -0.4, marginTop: 6, lineHeight: 1,
        fontVariantNumeric: "tabular-nums",
      }}>{fmt$(amt)}</div>
      {amt > 0 && (
        <div style={{ fontSize: 11, color: "var(--t3)", marginTop: 4, fontWeight: 500, fontVariantNumeric: "tabular-nums" }}>
          {fmtCRC(amt)}
        </div>
      )}
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
function App() {
  const { properties } = window.CASA_ANA_DATA;
  const [active, setActive] = useState("overview");

  const view = active === "overview"
    ? <Overview onPick={setActive} />
    : active.startsWith("contact:")
      ? <ContactsSection filterId={active.split(":")[1]} />
      : active === "contacts"
        ? <ContactsSection />
        : <PropertyPage p={properties.find(p => p.id === active)} />;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "var(--bg)" }}>
      <TopBar />
      <main style={{
        flex: 1,
        overflowY: "auto",
        padding: "40px 48px 60px",
      }}>
        <div style={{ maxWidth: 1040, margin: "0 auto" }}>
          {view}
        </div>
      </main>
      <PropertyTabs active={active} onPick={setActive} />
    </div>
  );
}

// ─── Top bar ────────────────────────────────────────────────────────────
function TopBar() {
  return (
    <header style={{
      display: "flex",
      alignItems: "center",
      justifyContent: "space-between",
      padding: "18px 32px",
      borderBottom: "1px solid var(--line)",
      background: "var(--bg2)",
      flexShrink: 0,
    }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 14 }}>
        <div style={{
          fontFamily: "var(--sans)", fontWeight: 700,
          fontSize: 22, lineHeight: 1, color: "var(--primary)",
          letterSpacing: -0.4,
        }}>Nena Casa</div>
        <div style={{
          fontSize: 11, color: "var(--t3)", fontWeight: 500,
          letterSpacing: 0.2,
        }}>Costa Rica · 4 rentals</div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{
          width: 32, height: 32, borderRadius: 50,
          background: "linear-gradient(135deg, #D88656, #C7A769)",
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontWeight: 700, fontSize: 13,
        }}>A</div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--t1)", lineHeight: 1.2 }}>Ana Augustine</div>
          <div style={{ fontSize: 10.5, color: "var(--t3)", marginTop: 1 }}>Owner</div>
        </div>
      </div>
    </header>
  );
}

// ─── Bottom property tabs ─────────────────────────────────────
function PropertyTabs({ active, onPick }) {
  const { properties, contacts } = window.CASA_ANA_DATA;
  const inContacts = active === "contacts" || active.startsWith("contact:");
  return (
    <nav style={{
      borderTop: "1px solid var(--line)",
      background: "var(--bg2)",
      padding: "10px 12px",
      display: "flex",
      gap: 8,
      flexShrink: 0,
      boxShadow: "0 -2px 8px rgba(27,31,29,0.03)",
      justifyContent: "center",
      flexWrap: "wrap",
    }}>
      <button
        onClick={() => onPick("overview")}
        style={tabBtnStyle(active === "overview")}
      >
        <span style={{
          width: 8, height: 8, borderRadius: 2,
          background: "linear-gradient(135deg, var(--primary), var(--primary-deep))",
        }}/>
        Overview
      </button>
      {properties.map(p => {
        const isActive = active === p.id;
        return (
          <button
            key={p.id}
            onClick={() => onPick(p.id)}
            style={tabBtnStyle(isActive)}
          >
            <span style={{
              width: 8, height: 8, borderRadius: 50,
              background: `linear-gradient(135deg, oklch(0.72 0.10 ${p.hue}), oklch(0.52 0.12 ${p.hue}))`,
              flexShrink: 0,
            }}/>
            {p.name}
            {p.status === "for-sale" && (
              <span style={{
                fontSize: 9, fontWeight: 700, letterSpacing: 0.4,
                color: "var(--accent)", background: "var(--accent-soft)",
                padding: "1px 6px", borderRadius: 999,
                textTransform: "uppercase", marginLeft: 2,
              }}>For sale</span>
            )}
          </button>
        );
      })}
      <button
        onClick={() => onPick("contacts")}
        style={tabBtnStyle(inContacts)}
      >
        <span style={{
          width: 8, height: 8, borderRadius: 50,
          background: "linear-gradient(135deg, #C7A769, #D88656)",
        }}/>
        Contacts
      </button>
    </nav>
  );
}

function tabBtnStyle(isActive) {
  return {
    display: "inline-flex",
    alignItems: "center",
    gap: 8,
    padding: "10px 16px",
    borderRadius: 999,
    background: isActive ? "var(--primary-tint)" : "transparent",
    color: isActive ? "var(--primary-deep)" : "var(--t2)",
    fontWeight: isActive ? 600 : 500,
    fontSize: 13.5,
    cursor: "pointer",
    transition: "background 120ms",
    whiteSpace: "nowrap",
    border: "none",
  };
}

// ─── Boot ───────────────────────────────────────────────────────
const splash = document.getElementById("splash");
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
setTimeout(() => { if (splash) splash.style.display = "none"; }, 200);

</script>

</body>
</html>
